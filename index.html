<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Bio | Identity</title>
    <style>
        :root {
            --bg-color: #090a0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #8a8f98;
            --accent-glow: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent-gradient);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: 50px; right: -50px; }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            z-index: 1;
            position: relative;
        }

        /* Profile Section */
        .profile-card {
            margin-bottom: 32px;
        }

        /* Forced Perfect Circle Wrapper Fix */
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            aspect-ratio: 1 / 1;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            aspect-ratio: 1 / 1;
        }

        .verified-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #3b82f6;
            color: #fff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            border: 2px solid var(--bg-color);
            z-index: 2;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .username {
            font-size: 0.95rem;
            color: var(--accent-glow);
            font-weight: 500;
            margin-bottom: 12px;
            display: inline-block;
        }

        .bio {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.5;
            padding: 0 10px;
        }

        /* Links Section */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bio-link {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .bio-link:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .bio-link.featured {
            background: var(--accent-gradient);
            border: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .bio-link.featured:hover {
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
            opacity: 0.95;
        }

        /* Layout alignments for brand assets */
        .link-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-right: 14px;
        }

        .link-icon svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }

        .link-text {
            flex-grow: 1;
            text-align: left;
        }

        .arrow-icon {
            font-size: 0.85rem;
            opacity: 0.6;
            transition: transform 0.2s ease;
            margin-left: auto;
        }

        .bio-link:hover .arrow-icon {
            transform: translateX(4px);
        }

        /* Footer */
        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: var(--text-sub);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
